name: Android build (debug APK)

# Builds an installable debug APK of the SwapMyShow Android app entirely on
# GitHub's runners (they ship the Android SDK + open internet). Run it from the
# Actions tab -> "Android build (debug APK)" -> "Run workflow", then download the
# "swapmyshow-debug-apk" artifact and sideload app-debug.apk onto a phone.
#
# Set repository variable VITE_API_URL (Settings -> Secrets and variables ->
# Actions -> Variables) to your deployed Worker URL so the app can reach the API.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build the web app
        working-directory: frontend
        env:
          # Baked into the bundle at build time. Point at the live Worker so the
          # installed app can reach the API (a phone can't see localhost).
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Sync web build into the Android project
        working-directory: frontend
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swapmyshow-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
